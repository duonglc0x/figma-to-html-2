<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title>Dự án 2</title>
  </head>
  <body>
    <!-- header -->
    <header>
      <div class="header">
        <div class="main-content">
          <div class="body">
            <img src="./assets/img/Logo.svg" alt="" class="logo" />
            <nav class="nav">
              <ul>
                <li>
                  <a href="">Home</a>
                </li>
                <li>
                  <a href="">Features</a>
                </li>
                <li>
                  <a href="">Pricing</a>
                </li>
                <li>
                  <a href="">Pricing</a>
                </li>
                <li>
                  <a href="">Contact</a>
                </li>
              </ul>
            </nav>
            <div class="btn-header">
              <button class="btn">Sign in</button>
              <button class="btn">Sign up</button>
            </div>
          </div>
        </div>
      </div>
    </header>
    <main>
      <!-- hero -->
      <div class="hero">
        <div class="main-content">
          <div class="body">
            <div class="hero-left">
              <p class="text">😎 EASY LEANING PLATFORM</p>
              <h1>Words learner come here.</h1>
              <p class="desc">
                Build skills with courses, certificates, and get online
                knowledge from our world-class platform.
              </p>
              <div class="btn-list">
                <button class="btn">Get Started</button>
                <div class="play">
                    <img src="./assets/icon/play0.jpg" alt="" />
                </div>
              </div>
            </div>
            <div class="hero-right">
              <img src="./assets/img/poster.svg" alt="" class="img" />
              <div class="course">
                <div class="book">
                  <img src="./assets/icon/Book.svg" alt="" />
                  <p class="desc">Courses 1000+</p>
                  <div class="dote"></div>
                </div>
              </div>
              <div class="Schedules">
                <p class="desc">Schedules</p>
                <div class="icon">
                  <img src="./assets/icon/Schedules2.svg" alt="" />
                  <img src="./assets/icon/Schedules1.svg" alt="" />
                  <img src="./assets/icon/Schedules2.svg" alt="" />
                </div>
              </div>
              <div class="student">
                <div class="content">
                  <p class="desc">Our Active Students</p>
                  <div class="avatar">
                    <img src="./assets/img/Haaland.jpg" alt="">
                    <img src="./assets/img/Mane.jpg" alt="">
                    <img src="./assets/img/Mbappe.jpg" alt="">
                    <img src="./assets/img/Son.jpg" alt="">
                    <div class="box">10K+</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
